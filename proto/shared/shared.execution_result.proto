syntax = "proto3";

package shared;

option ruby_package = "Tucana::Shared";

import "shared.struct.proto";
import "shared.errors.proto";

message NodeParameterNodeExecutionResult {
  shared.Value value = 5;
}

message NodeExecutionResult {

  oneof id {
    int64 node_id = 1;
    string function_identifier = 2;
  }

  int64 started_at = 3;
  int64 finished_at = 4;

  repeated NodeParameterNodeExecutionResult parameter_results = 5;

  oneof result {
    shared.Value success = 6;
    shared.Error error = 7;
  }

}

message ExecutionResult {

  string execution_identifier = 1;
  int64 flow_id = 2;
  int64 started_at = 3;
  int64 finished_at = 4;
  shared.Value input = 5;

  repeated NodeExecutionResult node_execution_results = 6;

  // Result of executed flow
  oneof result {
    shared.Value success = 7;
    shared.Error error = 8;
  }

}
