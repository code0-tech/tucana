syntax = "proto3";

option ruby_package = "Tucana::Shared";

package shared;

import "shared.translation.proto";

/*
    A data type is a custom implementation that could be compared to an object
    It could be as simple as a primitive but can be as complex as a structured object with rules
 */
message DefinitionDataType {

  // Unique identifier of the data type
  string identifier = 1;
  repeated Translation name = 2;
  repeated Translation display_message = 3;
  repeated Translation alias = 4;
  // Rules of the data type (e.g. Regex, contains...)
  repeated DefinitionDataTypeRule rules = 5;
  // List of generic keys
  repeated string generic_keys = 6;
  //the typescript signature representing this data type
  string type = 7;
  //will be used if the signature includes other data types that aren't TS standard
  repeated string linked_data_type_identifiers = 8;
  // Version of the data type
  // Format: "major.minor.patch", e.g. "1.2.3"
  string version = 9;
  // Identifier of the service that defines this definition
  string definition_source = 10;
}

message ExecutionDataType {
  // Unique identifier of the data type
  string identifier = 1;
  // Rules of the data type (e.g. Regex, Number_Range...)
  repeated ExecutionDataTypeRule rules = 2;
}

message DefinitionDataTypeRule {
  oneof config {
    DataTypeNumberRangeRuleConfig number_range = 1;
    DataTypeRegexRuleConfig regex = 2;
  }
}

message ExecutionDataTypeRule {
  oneof config {
    DataTypeNumberRangeRuleConfig number_range = 1;
    DataTypeRegexRuleConfig regex = 2;
  }
}

// Rule to check that the given number is contained inside the range of numbers
message DataTypeNumberRangeRuleConfig {
  int64 from = 1;
  int64 to = 2;
  optional int64 steps = 3;
}

// Rule to check that the given string matches the given regex pattern
message DataTypeRegexRuleConfig {
  string pattern = 1;
}
