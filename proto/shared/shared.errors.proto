syntax = "proto3";

package shared;

option ruby_package = "Tucana::Shared";

message ServiceError {
  string message = 1;
  repeated ServiceErrorDetails details = 2;
}

message ServiceErrorDetails {
  oneof kind {
    ServiceActiveModelError active_model_error = 1;
  }
}

message ServiceActiveModelError {
  string attribute = 1;
  string type = 2;
}
