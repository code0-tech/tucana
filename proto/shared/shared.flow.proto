syntax = "proto3";

option ruby_package = "Tucana::Shared";

package shared;

import "shared.struct.proto";
import "shared.data_type.proto";

message ValidationFlow {
  // Database ID -> req. for Aquila to identify in FlowStore
  int64 flow_id = 1;
  int64 project_id = 2;
  // The FlowType´s identifier
  string type = 3;
  // All custom data types used in this flow
  repeated shared.ExecutionDataType data_types = 4;
  repeated FlowSetting settings = 5;
  int64 starting_node_id = 6;
  repeated NodeFunction node_functions = 7;
  string project_slug = 8;
  optional string disable_reason = 9;
  string signature = 10;
}

message ExecutionFlow {
  // Database ID -> req. for Aquila to identify in FlowStore
  int64 flow_id = 1;
  int64 project_id = 5;
  int64 starting_node_id = 2;
  repeated NodeFunction node_functions = 4;
  optional shared.Value input_value = 3;
}

message FlowSetting {
  // The database id from sagittarius
  int64 database_id = 1;
  string flow_setting_id = 2;
  shared.Value value = 3;
  optional string cast = 4;
}

message NodeFunction {
  // The database id from sagittarius
  int64 database_id = 1;
  string runtime_function_id = 2;
  repeated NodeParameter parameters = 3;
  optional int64 next_node_id = 4;
  string definition_source = 5;
}

message NodeValue {
  oneof value {
    shared.Value literal_value = 1;
    ReferenceValue reference_value = 2;
    SubFlow sub_flow = 3;
  }
}

message NodeParameter {
  // The database id from sagittarius
  int64 database_id = 1;
  string runtime_parameter_id = 2;
  NodeValue value = 3;
  optional string cast = 4;
}

message ReferenceValue {
  oneof target {
    // Ref Value points to flow input
    FlowInput flow_input = 1; 
    // Ref Value points to a Result of a node, the int is the id of the node
    int64 node_id = 2;
    // Points to Value that is contained inside of a node 
    InputType input_type = 3;
  }
  repeated ReferencePath paths = 4;
}

message SubFlow {
  oneof execution_reference {
    int64 starting_node_id = 1;
    string function_identifier = 2;
  }

  string signature = 3;
  repeated SubFlowSetting settings = 4;
}

message SubFlowSetting {

  string identifier = 1;
  optional shared.Value default_value = 2;
  optional bool optional = 3;
  optional bool hidden = 4;

}

message FlowInput {}

message InputType {
  // Id of the node 
  int64 node_id = 1;
  // Index of the parameter inside the function
  int64 parameter_index = 2;
  // Index of the input type of the data type
  int64 input_index = 3;
}

message ReferencePath {
  optional string path = 1;
  optional int64 array_index = 2;
}

// Used in sagittarius´s FlowService because oneof can only
// take in a single message type and not a repeated one
message Flows {
  repeated ValidationFlow flows = 1;
}
