syntax = "proto3";

package shared;

option ruby_package = "Tucana::Shared";

message ModuleStatus {
  enum StatusVariant {
    UNKNOWN = 0;
    NOT_RESPONDING = 1;
    NOT_READY = 2;
    RUNNING = 3;
    STOPPED = 4;
  }

  // Identifier of this module
  string identifier = 1;
  // epoch timestamp in seconds
  int64 timestamp = 2; 
  StatusVariant status = 3;
}

