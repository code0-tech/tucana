syntax = "proto3";

package shared;

option ruby_package = "Tucana::Shared";

enum Status {
  UNKNOWN = 0;
  NOT_RESPONDING = 1;
  NOT_READY = 2;
  RUNNING = 3;
  STOPPED = 4;
}


message ModuleStatus {
  // Identifier of this module
  string identifier = 1;
  // epoch timestamp in seconds
  int64 timestamp = 2; 
  Status status = 3;
}

