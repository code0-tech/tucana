syntax = "proto3";

option ruby_package = "Tucana::Velorum";

package velorum;

import "shared.function.proto";
import "shared.data_type.proto";
import "shared.flow.proto";

message ModelsRequest {}

message Model {
  enum ModelType {
    UNKNOWN = 0;
    EXPLAIN = 1;
    GENERATE = 2;
  }

  string identifier = 1; // e.g. "gpt-3.5-turbo"
  string name = 2;
  float token_cost = 3; //e.g 1.0, 4.0
  repeated ModelType type = 4;
}

message ModelsResponse {
  repeated Model models = 1;
}


service InfoService {
  rpc Models (ModelsRequest) returns (ModelsResponse) {}
}
