syntax = "proto3";

option ruby_package = "Tucana::Velorum";

package velorum;

import "shared.function.proto";
import "shared.data_type.proto";
import "shared.flow.proto";

message PromptRequest {
  string prompt = 1;
  int64 project_id = 2;
  repeated shared.FunctionDefinition functions = 3;
  repeated shared.DefinitionDataType data_types = 4;
}

message PromptResponse {
  shared.GenerationFlow flow = 1;
  int64 cached_until = 2; // epoch timestamp in milliseconds
  int64 usage = 3; // in tokens
}

service PromptService {
  rpc Prompt (PromptRequest) returns (PromptResponse) {}
}