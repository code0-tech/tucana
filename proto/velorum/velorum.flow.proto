syntax = "proto3";

option ruby_package = "Tucana::Velorum";

package velorum;

import "shared.function.proto";
import "shared.data_type.proto";
import "shared.flow.proto";

message FlowRequest {
  string prompt = 1;
  shared.GenerationFlow flow = 2;
  int64 project_id = 3;
  repeated shared.FunctionDefinition functions = 4;
  repeated shared.DefinitionDataType data_types = 5;
}

message FlowResponse {
  shared.GenerationFlow flow = 1;
  int64 cached_until = 2; // epoch timestamp in milliseconds
  int64 usage = 3; // in tokens
}

service FlowService {
  rpc Flow (FlowRequest) returns (FlowResponse) {}
}
